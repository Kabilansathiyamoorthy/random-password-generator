<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
</head>
<body>
    <div class="container">
        <h1 id="heading">Generate a<br><span>
        random password</span></h1>
        <p id="heading-p">Never use an insecure password again</p>
        <button onclick="generate_password()">Generate passwords</button>
        <div class="password">
            <div class="password-box" onclick="copypassword('password1')">
                <p id="password1"></p>  
            </div>
            <div class="password-box" onclick="copypassword('password2')">
                <p id="password2"></p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
